# ── Database (adjust to your actual DB settings) ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal
spring.datasource.username=root
spring.datasource.password=David@1929
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── CRITICAL: 'update' tells Hibernate to ALTER the table and add missing
#    columns (like user_id) without dropping existing data.
#    If you had 'create' here before it was wiping the table on every restart.
spring.jpa.hibernate.ddl-auto=update

# ── Show SQL in console so you can see exactly what Hibernate runs ──────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB