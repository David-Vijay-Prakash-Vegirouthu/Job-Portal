# ── Database (adjust to your actual DB settings) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── 'update' is safe here for H2 and will preserve schema between restarts
spring.jpa.hibernate.ddl-auto=update

# ── Show SQL in console so you can see exactly what Hibernate runs ──────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.web.resources.static-locations=file:uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.port=${PORT:8080}